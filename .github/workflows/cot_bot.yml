name: Run COT Scraper Bot

on:
  schedule:
    # Berjalan setiap hari Sabtu jam 21:00 UTC (Minggu 04:00 WIB)
    # Anda bisa sesuaikan jamnya setelah memastikan data CFTC sudah rilis
    - cron: '0 21 * * 6'
  workflow_dispatch: # Tombol rahasia agar bisa lu jalankan manual kapan saja

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/sets-up-python@v4
      with:
        python-version: '3.10'

    - name: Execute Python Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python cot_scraper.py
