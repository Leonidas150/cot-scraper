name: Run COT Scraper Bot via Jina AI

on:

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4  # <-- UPGRADE KE V4 (Sudah Node 24)

    - name: Set up Python
      uses: actions/setup-python@v5  # <-- UPGRADE KE V5 (Sudah Node 24)
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Execute Python Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python cot_scraper.py
